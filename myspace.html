<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineWatch — My Space</title>
  <meta name="description" content="Your personal movie space. Rate, review, and track films.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────── -->
  <nav class="navbar">
  <a href="index.html" class="nav-logo">CINE<span>WATCH</span></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li>
      <a href="myspace.html">
        My Space
        <span class="nav-myspace-count" id="myspace-count" style="display:none">0</span>
      </a>
    </li>
  </ul>
  <button class="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

  <div class="page">
  <div class="section" style="flex:1">
    
      <!-- ── PROFILE HEADER ────────────────────────────── -->
      <div class="profile-header">
        <div class="profile-avatar">🎬</div>
        <div class="profile-info">
          <h1 class="profile-name">My <span>Space</span></h1>
          <p class="profile-sub">Your personal cinema — rated, reviewed, remembered.</p>
        </div>
        <a href="browse.html" class="btn btn-ghost" style="font-size:0.8rem;padding:0.5rem 1.1rem;margin-left:auto">+ Add Movies</a>
      </div>

      <!-- ── STATS ─────────────────────────────────────── -->
      <div class="myspace-stats" id="myspace-stats">
        <!-- Populated by myspace.js -->
      </div>

      <!-- ── TABS ──────────────────────────────────────── -->
      <div class="myspace-tabs">
        <button class="tab-btn active" id="tab-watched">Watched</button>        
        <button class="tab-btn" id="tab-myspace">Watchlist</button>
        <button class="tab-btn" id="tab-likes">Likes</button>
        <button class="tab-btn" id="tab-reviews">Reviews</button>
      </div>

      <div class="card-grid" id="myspace-grid"></div>


    <!-- ── FOOTER ────────────────────────────────────── -->
    <footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">CINE<span>WATCH</span></div>
    <div class="footer-center">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="myspace.html">My Space</a>
    </div>
    <div class="footer-api">
      <span>Powered by</span>
      <img
        src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg"
        alt="The Movie Database"
        class="tmdb-logo"
      >
    </div>
  </div>
  <p class="footer-copy">© 2026 CineWatch. This product uses the TMDb API but is not endorsed or certified by TMDb.</p>
</footer>
  </div>

<script src="js/app.js"></script>
<script src="js/myspace.js"></script>


<!-- ── MOVIE MODAL ────────────────────────────────── -->
<div class="cw-modal-backdrop" id="movie-modal">
  <div class="cw-modal">
    <div class="cw-modal-content"></div>
  </div>
</div>

<!-- ── RATING MODAL ──────────────────────────────── -->
<div class="cw-modal-backdrop" id="rate-modal">
  <div class="cw-modal" style="max-width:380px">
    <div class="cw-modal-content" id="rate-modal-content"></div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
</body>
</html>
