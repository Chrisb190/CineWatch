<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineWatch — Browse Movies</title>
  <meta name="description" content="Search and filter thousands of movies. Find your next watch.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────── -->
  <nav class="navbar">
  <a href="index.html" class="nav-logo">CINE<span>WATCH</span></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li>
      <a href="myspace.html">
        My Space
        <span class="nav-myspace-count" id="myspace-count" style="display:none">0</span>
      </a>
    </li>
  </ul>
  <button class="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

  <div class="page">
    <div class="section">

      <!-- ── PAGE HEADER ─────────────────────────────── -->
      <div class="section-header">
        <h2 class="section-title">Browse <span>Movies</span></h2>
      </div>

      <!-- ── SEARCH & FILTER BAR ──────────────────────── -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            class="search-input"
            id="browse-search"
            placeholder="Search movies, directors, actors…"
            autocomplete="off"
          >
        </div>
        <select class="filter-select" id="year-filter" aria-label="Filter by year">
          <!-- Populated by browse.js -->
        </select>
      </div>

      <!-- ── GENRE PILLS ───────────────────────────────── -->
      <div class="genre-pills" id="genre-pills">
        <button class="pill genre-pill active" data-genre="all">All</button>
        <button class="pill genre-pill" data-genre="action">Action</button>
        <button class="pill genre-pill" data-genre="drama">Drama</button>
        <button class="pill genre-pill" data-genre="comedy">Comedy</button>
        <button class="pill genre-pill" data-genre="thriller">Thriller</button>
        <button class="pill genre-pill" data-genre="horror">Horror</button>
        <button class="pill genre-pill" data-genre="scifi">Sci-Fi</button>
        <button class="pill genre-pill" data-genre="romance">Romance</button>
        <button class="pill genre-pill" data-genre="animation">Animation</button>
        <button class="pill genre-pill" data-genre="documentary">Documentary</button>
      </div>

      <!-- ── CARD GRID ─────────────────────────────────── -->
      <div class="card-grid" id="browse-grid">
        <!-- Populated by browse.js -->
      </div>

      <!-- ── PAGINATION ────────────────────────────────── -->
      <div class="pagination" id="pagination"></div>

    </div>

    <!-- ── FOOTER ─────────────────────────────────────── -->
    <footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">CINE<span>WATCH</span></div>
    <div class="footer-center">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="myspace.html">My Space</a>
    </div>
    <div class="footer-api">
      <span>Powered by</span>
      <img
        src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg"
        alt="The Movie Database"
        class="tmdb-logo"
      >
    </div>
  </div>
  <p class="footer-copy">© 2026 CineWatch. This product uses the TMDb API but is not endorsed or certified by TMDb.</p>
</footer>

<script src="js/app.js"></script>
<script src="js/browse.js"></script>

<!-- ── MOVIE MODAL ────────────────────────────────── -->
<div class="cw-modal-backdrop" id="movie-modal">
  <div class="cw-modal">
    <div class="cw-modal-content"></div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
</body>
</html>
