<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineWatch — Browse Movies</title>
  <meta name="description" content="Search and filter thousands of movies. Find your next watch.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────── -->
  <nav class="navbar">
    <a href="home.html" class="nav-logo">CINE<span>WATCH</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li><a href="myspace.html">My Space</a></li>
    </ul>
    <button class="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page">
    <div class="section">

      <!-- ── PAGE HEADER ─────────────────────────────── -->
      <div class="section-header">
        <h2 class="section-title">Browse <span>Movies</span></h2>
      </div>

      <!-- ── SEARCH & FILTER BAR ──────────────────────── -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            class="search-input"
            id="browse-search"
            placeholder="Search movies, directors, actors…"
            autocomplete="off"
          >
        </div>
        <select class="filter-select" id="year-filter" aria-label="Filter by year">
          <!-- Populated by browse.js -->
        </select>
      </div>

      <!-- ── GENRE PILLS ───────────────────────────────── -->
      <div class="genre-pills" id="genre-pills">
        <button class="pill genre-pill active" data-genre="all">All</button>
        <button class="pill genre-pill" data-genre="action">Action</button>
        <button class="pill genre-pill" data-genre="drama">Drama</button>
        <button class="pill genre-pill" data-genre="comedy">Comedy</button>
        <button class="pill genre-pill" data-genre="thriller">Thriller</button>
        <button class="pill genre-pill" data-genre="horror">Horror</button>
        <button class="pill genre-pill" data-genre="scifi">Sci-Fi</button>
        <button class="pill genre-pill" data-genre="romance">Romance</button>
        <button class="pill genre-pill" data-genre="animation">Animation</button>
        <button class="pill genre-pill" data-genre="documentary">Documentary</button>
      </div>

      <!-- ── CARD GRID ─────────────────────────────────── -->
      <!--
        CUSTOM UI REQUIREMENT: Responsive card grid with hover effects
        Grid uses CSS Grid auto-fill columns. Each card reveals an overlay
        on hover with title, rating, genre, and action buttons.
        Implemented via .card-grid in style.css and CardRenderer in app.js
      -->
      <div class="card-grid" id="browse-grid">
        <!-- Populated by browse.js -->
      </div>

      <!-- ── PAGINATION ────────────────────────────────── -->
      <div class="pagination" id="pagination"></div>

    </div>

    <!-- ── FOOTER ─────────────────────────────────────── -->
    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">CINE<span>WATCH</span></div>
        <div class="footer-center">
          <a href="home.html">Home</a>
          <a href="browse.html">Browse</a>
          <a href="myspace.html">My Space</a>
        </div>
      </div>
      <p class="footer-copy">© 2025 CineWatch.</p>
    </footer>
  </div>
<script src="js/app.js"></script>
</body>
</html>
